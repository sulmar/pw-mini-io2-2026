name: Template CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ProjectTemplate.sln
        working-directory: docs/project-template

      - name: Build
        run: dotnet build ProjectTemplate.sln --configuration Release --no-restore
        working-directory: docs/project-template

      - name: Test
        run: dotnet test ProjectTemplate.sln --configuration Release --no-build
        working-directory: docs/project-template
